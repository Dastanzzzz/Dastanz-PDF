spring.application.name=ai-pdf-editor
server.port=8080

# File Upload Settings
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Gemini AI configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# OCR – Tesseract configuration
tesseract.datapath=${TESSDATA_PREFIX:C:/Program Files/Tesseract-OCR/tessdata}
tesseract.language=eng

# -------------------------
# Database & JPA (Phase 1)
# -------------------------
spring.datasource.url=jdbc:h2:mem:pdfeditordb
spring.datasource.driverClassName=org.h2.Driver

# -------------------------
# Storage Configuration
# -------------------------
# Switch storage type between 'local' and 's3'
storage.type=local

# AWS S3 Settings (Required if storage.type=s3)
aws.s3.access.key=${AWS_ACCESS_KEY:dummy-access}
aws.s3.secret.key=${AWS_SECRET_KEY:dummy-secret}
aws.s3.region=${AWS_REGION:us-east-1}
aws.s3.bucket.name=${AWS_BUCKET_NAME:my-pdf-bucket}

spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
